<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="customerNavbar(activePage)" class="customer-navbar">
    <div class="customer-navbar__container">

        <!-- Logo -->
        <a th:href="@{/store}" class="customer-navbar__logo">
            <svg class="customer-navbar__logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span class="customer-navbar__logo-text" id="customerNavbarBrand">SmartOrder</span>
        </a>

        <!-- Categories Dropdown -->
        <div class="customer-navbar__categories">
            <button class="customer-navbar__categories-trigger" id="categoriesTrigger" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <span data-i18n="storeNavbar.categories">Categories</span>
            </button>
            <div class="customer-navbar__categories-dropdown" id="categoriesDropdown" hidden>
                <a th:href="@{/store}" class="customer-navbar__categories-link" data-i18n="storeNavbar.allProducts">All Products</a>
                <div class="customer-navbar__categories-divider"></div>
                <div id="categoriesList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Search -->
        <form class="customer-navbar__search" onsubmit="return false;">
            <input
                    type="text"
                    class="customer-navbar__search-input"
                    id="storeSearchInput"
                    data-i18n-placeholder="storeNavbar.searchPlaceholder"
                    placeholder="Search products..."
                    autocomplete="off">
            <button type="button" class="customer-navbar__search-btn" id="storeSearchBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </form>

        <!-- Actions: Language, Theme, Cart, Profile -->
        <div class="customer-navbar__actions">

            <!-- Language -->
            <div class="customer-navbar__lang">
                <button class="customer-navbar__icon-btn" id="customerLangBtn" type="button" data-i18n-title="storeNavbar.language" title="Language">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                    </svg>
                </button>
                <div class="customer-navbar__lang-dropdown" id="customerLangDropdown" hidden>
                    <button class="customer-navbar__lang-item" data-lang="en" type="button">English</button>
                    <button class="customer-navbar__lang-item" data-lang="pt" type="button">Português</button>
                    <button class="customer-navbar__lang-item" data-lang="es" type="button">Español</button>
                    <button class="customer-navbar__lang-item" data-lang="fr" type="button">Français</button>
                </div>
            </div>

            <!-- Theme -->
            <button class="customer-navbar__icon-btn" id="customerThemeBtn" type="button" data-i18n-title="storeNavbar.theme" title="Theme">
                <svg class="customer-navbar__icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
                <svg class="customer-navbar__icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>

            <!-- Cart -->
            <a th:href="@{/store/cart}" class="customer-navbar__cart" data-i18n-title="storeNavbar.cart" title="Cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
                </svg>
                <span class="customer-navbar__cart-badge" id="cartBadge" hidden>0</span>
            </a>

            <!-- Profile -->
            <div class="customer-navbar__profile">
                <button class="customer-navbar__profile-trigger" id="profileTrigger" type="button">
                    <div class="customer-navbar__avatar" id="profileAvatar">U</div>
                </button>
                <div class="customer-navbar__profile-dropdown" id="profileDropdown" hidden>
                    <div class="customer-navbar__profile-header">
                        <div class="customer-navbar__avatar customer-navbar__avatar--lg" id="profileAvatarLg">U</div>
                        <div class="customer-navbar__profile-info">
                            <p class="customer-navbar__profile-name" id="profileName">User</p>
                            <p class="customer-navbar__profile-email" id="profileEmail">email@example.com</p>
                        </div>
                    </div>
                    <div class="customer-navbar__profile-divider"></div>
                    <a th:href="@{/profile}" class="customer-navbar__profile-link" data-i18n="storeNavbar.myAccount">My Account</a>
                    <a th:href="@{/store/orders}" class="customer-navbar__profile-link" data-i18n="storeNavbar.myOrders">My Orders</a>
                    <a th:href="@{/store/favorites}" class="customer-navbar__profile-link" data-i18n="storeNavbar.favorites">Favorites</a>
                    <div class="customer-navbar__profile-divider"></div>
                    <button class="customer-navbar__profile-link customer-navbar__profile-link--danger" id="logoutBtn" type="button" data-i18n="storeNavbar.logout">Logout</button>
                </div>
            </div>

        </div>
    </div>
</nav>

<script th:src="@{/js/i18n.js}"></script>
<script th:src="@{/js/lang/en.js}"></script>
<script th:src="@{/js/lang/pt.js}"></script>
<script th:src="@{/js/lang/es.js}"></script>
<script th:src="@{/js/lang/fr.js}"></script>

</body>
</html>
