<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="storeFooter" class="store-footer">
    <div class="store-footer__container">

        <!-- ===== Top: brand + columns ===== -->
        <div class="store-footer__top">

            <!-- Brand block -->
            <div class="store-footer__brand">
                <div class="store-footer__logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"/>
                        <circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                    <span class="store-footer__logo-text">SmartOrder</span>
                </div>
                <p class="store-footer__tagline" data-i18n="storeFooter.tagline">
                    Smart e-commerce for modern shopping experiences.
                </p>

                <!-- Social links -->
                <div class="store-footer__socials">
                    <a href="https://github.com/Kauan-FR"
                       target="_blank" rel="noopener noreferrer"
                       class="store-footer__social"
                       aria-label="GitHub">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 .3a12 12 0 0 0-3.79 23.4c.6.1.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.21.09 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.31 1.23a11.42 11.42 0 0 1 6.02 0c2.3-1.55 3.31-1.23 3.31-1.23.65 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.82 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.83.58A12 12 0 0 0 12 .3"/>
                        </svg>
                    </a>
                    <a href="https://www.linkedin.com/in/kauan-santos-ferreira"
                       target="_blank" rel="noopener noreferrer"
                       class="store-footer__social"
                       aria-label="LinkedIn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.26 2.37 4.26 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zm1.78 13.02H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.23 0z"/>
                        </svg>
                    </a>
                </div>
            </div>

            <!-- Columns -->
            <div class="store-footer__columns">

                <!-- Shop -->
                <div class="store-footer__column" data-accordion>
                    <button type="button" class="store-footer__column-title" data-accordion-trigger>
                        <span data-i18n="storeFooter.titleShop">Shop</span>
                        <svg class="store-footer__chevron" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round"
                             stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <ul class="store-footer__column-list" data-accordion-content>
                        <li><a href="/store" data-i18n="storeFooter.allProducts">All Products</a></li>
                        <li><a href="#" data-i18n="storeFooter.categories">Categories</a></li>
                        <li><a href="#" data-i18n="storeFooter.deals">Today's Deals</a></li>
                        <li><a href="#" data-i18n="storeFooter.newArrivals">New Arrivals</a></li>
                    </ul>
                </div>

                <!-- Project -->
                <div class="store-footer__column" data-accordion>
                    <button type="button" class="store-footer__column-title" data-accordion-trigger>
                        <span data-i18n="storeFooter.titleProject">Project</span>
                        <svg class="store-footer__chevron" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round"
                             stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <ul class="store-footer__column-list" data-accordion-content>
                        <li>
                            <a href="#" data-i18n="storeFooter.about">About this Project</a>
                        </li>
                        <li>
                            <a href="https://github.com/Kauan-FR/smartorder-api"
                               target="_blank" rel="noopener noreferrer"
                               data-i18n="storeFooter.github">GitHub Repository</a>
                        </li>
                        <li>
                            <a href="/swagger-ui/index.html"
                               target="_blank" rel="noopener noreferrer"
                               data-i18n="storeFooter.api">API Documentation</a>
                        </li>
                        <li>
                            <a href="https://www.linkedin.com/in/kauan-santos-ferreira"
                               target="_blank" rel="noopener noreferrer"
                               data-i18n="storeFooter.linkedin">Developer LinkedIn</a>
                        </li>
                    </ul>
                </div>
            </div> <!-- CORREÇÃO: Fecha store-footer__columns -->
        </div> <!-- CORREÇÃO: Fecha store-footer__top -->

        <!-- ===== Bottom: payment + copyright ===== -->
        <div class="store-footer__bottom">

            <div class="store-footer__payment">
                <span class="store-footer__payment-label" data-i18n="storeFooter.label">
                    We accept:
                </span>
                <div class="store-footer__payment-icons">

                    <!-- Visa -->
                    <span class="store-footer__payment-icon" aria-label="Visa">
                        <svg viewBox="0 0 48 32">
                            <rect width="48" height="32" rx="4" fill="#1A1F71"/>
                            <text x="24" y="21" text-anchor="middle"
                                  font-family="Arial, sans-serif" font-weight="bold"
                                  font-size="11" fill="#FFFFFF" letter-spacing="1">VISA</text>
                        </svg>
                    </span>

                    <!-- Mastercard -->
                    <span class="store-footer__payment-icon" aria-label="Mastercard">
                        <svg viewBox="0 0 48 32">
                            <rect width="48" height="32" rx="4" fill="#FFFFFF"
                                  stroke="#E5E7EB" stroke-width="1"/>
                            <circle cx="20" cy="16" r="7" fill="#EB001B"/>
                            <circle cx="28" cy="16" r="7" fill="#F79E1B"/>
                            <path d="M24 10.5a7 7 0 0 1 0 11 7 7 0 0 1 0-11z" fill="#FF5F00"/>
                        </svg>
                    </span>

                    <!-- Pix -->
                    <span class="store-footer__payment-icon" aria-label="Pix">
                        <svg viewBox="0 0 48 32">
                            <rect width="48" height="32" rx="4" fill="#FFFFFF"
                                  stroke="#E5E7EB" stroke-width="1"/>
                            <text x="24" y="20" text-anchor="middle"
                                  font-family="Arial, sans-serif" font-weight="bold"
                                  font-size="10" fill="#32BCAD">PIX</text>
                        </svg>
                    </span>

                    <!-- Boleto -->
                    <span class="store-footer__payment-icon" aria-label="Boleto">
                        <svg viewBox="0 0 48 32">
                            <rect width="48" height="32" rx="4" fill="#FFFFFF"
                                  stroke="#E5E7EB" stroke-width="1"/>
                            <g fill="#374151">
                                <rect x="10" y="9" width="2" height="14"/>
                                <rect x="14" y="9" width="1" height="14"/>
                                <rect x="17" y="9" width="3" height="14"/>
                                <rect x="22" y="9" width="1" height="14"/>
                                <rect x="25" y="9" width="2" height="14"/>
                                <rect x="29" y="9" width="3" height="14"/>
                                <rect x="34" y="9" width="1" height="14"/>
                                <rect x="37" y="9" width="2" height="14"/>
                            </g>
                        </svg>
                    </span>

                    <!-- PayPal -->
                    <span class="store-footer__payment-icon" aria-label="PayPal">
                        <svg viewBox="0 0 48 32">
                            <rect width="48" height="32" rx="4" fill="#FFFFFF"
                                  stroke="#E5E7EB" stroke-width="1"/>
                            <text x="24" y="20" text-anchor="middle"
                                  font-family="Arial, sans-serif" font-style="italic"
                                  font-weight="bold" font-size="9" fill="#003087">Pay</text>
                            <text x="24" y="20" text-anchor="start" dx="4"
                                  font-family="Arial, sans-serif" font-style="italic"
                                  font-weight="bold" font-size="9" fill="#009CDE">Pal</text>
                        </svg>
                    </span>
                </div>
            </div>

            <p class="store-footer__copyright">
                <span data-i18n="storeFooter.copyright.prefix">©</span>
                <span id="storeFooterYear">2026</span>
                <span data-i18n="storeFooter.copyright.text">SmartOrder. All rights reserved.</span>
                <span class="store-footer__version">· v1.0.0-beta</span>
            </p>
        </div>
    </div>

</footer>

</body>
</html>
