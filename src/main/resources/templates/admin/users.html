<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Users')}">
</head>
<body>

<!-- Page-specific CSS -->
<link th:href="@{/css/components/buttons.css}" rel="stylesheet">
<link th:href="@{/css/components/cards.css}" rel="stylesheet">
<link th:href="@{/css/components/badges.css}" rel="stylesheet">
<link th:href="@{/css/components/table.css}" rel="stylesheet">
<link th:href="@{/css/components/avatar.css}" rel="stylesheet">
<link th:href="@{/css/components/popup-menu.css}" rel="stylesheet">
<link th:href="@{/css/components/forms.css}" rel="stylesheet">
<link th:href="@{/css/components/modal.css}" rel="stylesheet">
<link th:href="@{/css/layouts/sidebar.css}" rel="stylesheet">
<link th:href="@{/css/pages/admin-crud.css}" rel="stylesheet">

<!-- Sidebar Fragment -->
<aside th:replace="~{fragments/sidebar :: sidebar('users')}"></aside>

<!-- Main Content -->
<main class="admin-content" id="adminContent">

    <!-- Page Header -->
    <div class="crud-header">
        <div class="crud-header__left">
            <h1>Users</h1>
            <p class="crud-header__subtitle">Manage registered users</p>
        </div>
        <div class="crud-header__right">
            <button class="btn btn-primary" onclick="openCreateModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New user
            </button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="crud-toolbar">
        <div class="search-bar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search users..." id="searchInput" oninput="searchUsers(this.value)">
        </div>
    </div>

    <!-- Users Table -->
    <div class="table-container">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Phone</th>
                <th>Created at</th>
                <th style="text-align:right;">Actions</th>
            </tr>
            </thead>
            <tbody id="usersTableBody">
            <tr>
                <td colspan="7" style="text-align:center;padding:24px;color:var(--text-tertiary);">Loading users...</td>
            </tr>
            </tbody>
        </table>
    </div>

    <p style="text-align:center;font-size:var(--text-xs);color:var(--text-tertiary);margin-top:var(--space-6);">SmartOrder API v1.0 — Admin panel</p>
</main>

<!-- Create/Edit Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
<div class="modal" id="userModal">
    <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">New user</h2>
        <div class="modal__close" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
    </div>
    <div class="modal__body">
        <div class="modal__error" id="modalError"></div>
        <input type="hidden" id="userId">

        <div class="modal__form-group">
            <label class="label" for="userName">Name</label>
            <input class="input" type="text" id="userName" placeholder="e.g. John Doe" maxlength="100">
        </div>

        <div class="modal__form-group">
            <label class="label" for="userEmail">Email</label>
            <input class="input" type="email" id="userEmail" placeholder="e.g. john@email.com" maxlength="100">
        </div>

        <!-- Password: only visible on create -->
        <div class="modal__form-group" id="passwordGroup">
            <label class="label" for="userPassword">Password</label>
            <div class="password-wrapper">
                <input class="input" type="password" id="userPassword" placeholder="Enter password" maxlength="255">
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <div class="modal__form-row">
            <div class="modal__form-group">
                <label class="label" for="userRole">Role</label>
                <select class="input" id="userRole">
                    <option value="">Select a role...</option>
                    <option value="ADMIN">Admin</option>
                    <option value="CUSTOMER">Customer</option>
                </select>
            </div>
            <div class="modal__form-group">
                <label class="label" for="userPhone">Phone</label>
                <input class="input" type="text" id="userPhone" placeholder="e.g. (79) 99136-0275" maxlength="20">
            </div>
        </div>

        <!-- Change password button: only visible on edit -->
        <div class="modal__form-group" id="changePasswordGroup" style="display:none;">
            <button class="btn btn-outline btn-sm" type="button" onclick="openPasswordModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Change password
            </button>
        </div>

    </div>
    <div class="modal__footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modalSubmitBtn" onclick="saveUser()">Create</button>
    </div>
</div>

<!-- Change Password Modal -->
<div class="modal" id="passwordModal">
    <div class="modal__header">
        <h2 class="modal__title">Change password</h2>
        <div class="modal__close" onclick="closePasswordModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
    </div>
    <div class="modal__body">
        <div class="modal__error" id="passwordError"></div>
        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4);" id="passwordUserInfo"></p>
        <div class="modal__form-group">
            <label class="label" for="newPassword">New password</label>
            <div class="password-wrapper">
                <input class="input" type="password" id="newPassword" placeholder="Enter new password" maxlength="255">
                <button type="button" class="password-toggle" onclick="toggleNewPasswordVisibility()">
                    <svg id="newEyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
    </div>
    <div class="modal__footer">
        <button class="btn btn-outline" onclick="closePasswordModal()">Cancel</button>
        <button class="btn btn-primary" id="passwordSubmitBtn" onclick="savePassword()">Update password</button>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal" id="deleteModal">
    <div class="modal__body" style="padding-top:var(--space-8);">
        <div class="modal__confirm-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </div>
        <p class="modal__confirm-title">Delete user</p>
        <p class="modal__confirm-text" id="deleteText">Are you sure you want to delete this user? This action cannot be undone.</p>
        <div class="modal__error" id="deleteError"></div>
    </div>
    <div class="modal__footer">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn" onclick="confirmDelete()">Delete</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/admin-users.js}"></script>

</body>
</html>
