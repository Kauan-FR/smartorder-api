<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}">
</head>
<body>

<!-- Page-specific CSS -->
<link th:href="@{/css/components/buttons.css}" rel="stylesheet">
<link th:href="@{/css/components/cards.css}" rel="stylesheet">
<link th:href="@{/css/components/badges.css}" rel="stylesheet">
<link th:href="@{/css/components/table.css}" rel="stylesheet">
<link th:href="@{/css/components/avatar.css}" rel="stylesheet">
<link th:href="@{/css/components/popup-menu.css}" rel="stylesheet">
<link th:href="@{/css/components/forms.css}" rel="stylesheet">
<link th:href="@{/css/layouts/sidebar.css}" rel="stylesheet">
<link th:href="@{/css/pages/admin-dashboard.css}" rel="stylesheet">
<link th:href="@{/css/components/help-modals.css}" rel="stylesheet">

<!-- Sidebar -->
<aside th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></aside>

<!-- Main Content -->
<main class="admin-content" id="adminContent">

    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <div class="dashboard-header__left">
            <h1>Dashboard</h1>
            <p class="dashboard-header__subtitle" id="welcomeText">Welcome back</p>
        </div>
        <div class="dashboard-header__right">
            <div class="search-bar" style="width:200px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" placeholder="Search...">
            </div>
            <button class="btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 01-3.46 0"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Metric Cards -->
    <div class="metrics-grid" id="metricsGrid">
        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label">Total orders</p>
                    <p class="card-metric__value" id="metricOrders">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:var(--color-info-light);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="var(--color-info-text)" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label">Revenue</p>
                    <p class="card-metric__value" id="metricRevenue">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:var(--color-success-light);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="var(--color-success)" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label">Users</p>
                    <p class="card-metric__value" id="metricUsers">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:#EEEDFE;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#534AB7" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label">Products</p>
                    <p class="card-metric__value" id="metricProducts">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:#FAEEDA;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#854F0B" stroke-width="2">
                        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Grid: Recent Orders + Status -->
    <div class="dashboard-grid">

        <!-- Recent Orders Table -->
        <div class="table-container">
            <div class="table-container__header">
                <p class="table-container__title">Recent orders</p>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Order</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="ordersTableBody">
                <tr>
                    <td colspan="4" style="text-align:center;padding:24px;color:var(--text-tertiary);">Loading orders...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Orders by Status + Quick Actions -->
        <div class="card">
            <p style="font-size:var(--text-md);font-weight:var(--font-medium);color:var(--text-primary);margin-bottom:var(--space-5);">Orders by status</p>

            <div class="status-bars" id="statusBars">
                <p style="color:var(--text-tertiary);font-size:var(--text-sm);">Loading...</p>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <p class="quick-actions__title">Quick actions</p>
                <div class="quick-actions__list">
                    <a href="/admin/products" class="quick-action">
                        <span class="quick-action__icon">+</span> New product
                    </a>
                    <a href="/admin/categories" class="quick-action">
                        <span class="quick-action__icon">+</span> New category
                    </a>
                    <a href="/admin/users" class="quick-action">
                        <span class="quick-action__icon">+</span> Add admin user
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <p style="text-align:center;font-size:var(--text-xs);color:var(--text-tertiary);">SmartOrder API v1.0 — Admin panel</p>

</main>

<div th:replace="~{fragments/help-modals :: helpModals}"></div>

<!-- Scripts -->
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/admin-help.js}"></script>
<script th:src="@{/js/admin-dashboard.js}"></script>

</body>
</html>
