<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}">
</head>
<body>

<!-- Page-specific CSS -->
<link th:href="@{/css/components/buttons.css}" rel="stylesheet">
<link th:href="@{/css/components/cards.css}" rel="stylesheet">
<link th:href="@{/css/components/badges.css}" rel="stylesheet">
<link th:href="@{/css/components/table.css}" rel="stylesheet">
<link th:href="@{/css/components/avatar.css}" rel="stylesheet">
<link th:href="@{/css/components/popup-menu.css}" rel="stylesheet">
<link th:href="@{/css/components/forms.css}" rel="stylesheet">
<link th:href="@{/css/layouts/sidebar.css}" rel="stylesheet">
<link th:href="@{/css/layouts/topbar.css}" rel="stylesheet">
<link th:href="@{/css/pages/admin-dashboard.css}" rel="stylesheet">
<link th:href="@{/css/components/help-modals.css}" rel="stylesheet">

<!-- Sidebar -->
<aside th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></aside>
<header th:replace="~{fragments/topbar :: topbar}"></header>

<!-- Main Content -->
<main class="admin-content" id="adminContent">

    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <div class="dashboard-header__left">
            <h1 data-i18n="dashboard.title">Dashboard</h1>
            <p class="dashboard-header__subtitle" id="welcomeText" data-i18n="dashboard.welcome">Welcome back</p>
        </div>
    </div>

    <!-- Metric Cards -->
    <div class="metrics-grid" id="metricsGrid">
        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label" data-i18n="dashboard.totalOrders">Total orders</p>
                    <p class="card-metric__value" id="metricOrders">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:var(--color-info-light);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="var(--color-info-text)" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label" data-i18n="dashboard.revenue">Revenue</p>
                    <p class="card-metric__value" id="metricRevenue">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:var(--color-success-light);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="var(--color-success)" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label" data-i18n="dashboard.users">Users</p>
                    <p class="card-metric__value" id="metricUsers">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:#EEEDFE;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#534AB7" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="card-metric">
            <div class="card-metric__header">
                <div>
                    <p class="card-metric__label" data-i18n="dashboard.products">Products</p>
                    <p class="card-metric__value" id="metricProducts">--</p>
                </div>
                <div class="card-metric__icon" style="background-color:#FAEEDA;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#854F0B" stroke-width="2">
                        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Grid: Recent Orders + Status -->
    <div class="dashboard-grid">

        <!-- Recent Orders Table -->
        <div class="table-container">
            <div class="table-container__header">
                <p class="table-container__title" data-i18n="dashboard.recentOrders">Recent orders</p>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th data-i18n="dashboard.thOrder">Order</th>
                    <th data-i18n="dashboard.thCustomer">Customer</th>
                    <th data-i18n="dashboard.thTotal">Total</th>
                    <th data-i18n="dashboard.thStatus">Status</th>
                </tr>
                </thead>
                <tbody id="ordersTableBody">
                <tr>
                    <td colspan="4" style="text-align:center;padding:24px;color:var(--text-tertiary);" data-i18n="dashboard.loadingOrders">Loading orders...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Orders by Status + Quick Actions -->
        <div class="card">
            <p style="font-size:var(--text-md);font-weight:var(--font-medium);color:var(--text-primary);margin-bottom:var(--space-5);" data-i18n="dashboard.ordersByStatus">Orders by status</p>

            <div class="status-bars" id="statusBars">
                <p style="color:var(--text-tertiary);font-size:var(--text-sm);">Loading...</p>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <p class="quick-actions__title" data-i18n="dashboard.quickActions">Quick actions</p>
                <div class="quick-actions__list">
                    <a href="/admin/products" class="quick-action" data-i18n="dashboard.newProduct">
                        <span class="quick-action__icon">+</span> New product
                    </a>
                    <a href="/admin/categories" class="quick-action" data-i18n="dashboard.newCategory">
                        <span class="quick-action__icon">+</span> New category
                    </a>
                    <a href="/admin/users" class="quick-action" data-i18n="dashboard.addAdminUser">
                        <span class="quick-action__icon">+</span> Add admin user
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <p style="text-align:center;font-size:var(--text-xs);color:var(--text-tertiary);" data-i18n="common.footer">SmartOrder API v1.0 — Admin panel</p>

</main>

<div th:replace="~{fragments/help-modals :: helpModals}"></div>

<!-- Scripts -->
<script th:src="@{/js/i18n.js}"></script>
<script th:src="@{/js/lang/en.js}"></script>
<script th:src="@{/js/lang/pt.js}"></script>
<script th:src="@{/js/lang/es.js}"></script>
<script th:src="@{/js/lang/fr.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/admin-topbar.js}"></script>
<script th:src="@{/js/admin-help.js}"></script>
<script th:src="@{/js/admin-dashboard.js}"></script>

</body>
</html>
